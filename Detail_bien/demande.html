<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Demande de logement - IMMOUNCHK</title>
    <link rel="stylesheet" href="style_demande.css" />
</head>
<body>
    <div class="container">
        <h1>Faire une demande pour ce bien</h1>
        <form>
            <label>Nom complet :</label>
            <input type="text" placeholder="Entrez votre nom" required />

            <label>Email :</label>
            <input type="email" placeholder="Entrez votre email" required />

            <label>Téléphone :</label>
            <input type="tel" placeholder="Entrez votre numéro" required />

            <label>Date d'entrée souhaitée :</label>
            <input type="date" required />

            <label>Message :</label>
            <textarea rows="4" placeholder="Précisez votre demande..."></textarea>

            <button type="submit">Envoyer la demande</button>
        </form>
        <a href="detail_bien.html">← Retour au bien</a>
    </div>
</body>
</html>
